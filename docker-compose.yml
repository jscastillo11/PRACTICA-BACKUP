# Despliegue completo: Elasticsearch + Mongo + Kafka (KRaft 3.9, imagen apache/kafka) + import datos +
# Spark Streaming (predicción) + Flask.
# Requisito: carpeta ./models con los artefactos entrenados (ver README / train_spark_mllib_model.py).
# Lakehouse (Parte II): MinIO (S3) + ingesta Iceberg del dataset de entrenamiento. Requiere ./data/simple_flight_delay_features.jsonl.bz2 o .jsonl.
# Uso: docker compose up --build -d
# Web: http://localhost:5001/flights/delays/predict_kafka

services:
  minio:
    image: minio/minio:RELEASE.2024-10-29T16-01-48Z
    hostname: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2024-10-29T15-34-59Z
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        for i in $$(seq 1 40); do
          if mc alias set local http://minio:9000 minioadmin minioadmin 2>/dev/null; then
            break
          fi
          echo "Esperando a MinIO ($$i)..."
          sleep 2
        done
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/lakehouse
        echo "Bucket lakehouse listo."
    restart: "no"

  lakehouse-ingest:
    build:
      context: .
      dockerfile: docker/lakehouse-ingest/Dockerfile
    hostname: lakehouse-ingest
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      S3_WAREHOUSE_BUCKET: lakehouse
      PRACTICA_DATA_DIR: /opt/practica/data
      ICEBERG_CATALOG_NAME: lakehouse
      ICEBERG_TRAINING_TABLE: lakehouse.flights.training_features
    volumes:
      - ./data:/opt/practica/data:ro
    restart: "no"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.21
    hostname: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:9200/_cluster/health >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s

  mongo:
    image: mongo:7.0.17
    hostname: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo-import:
    image: mongo:7.0.17
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./data:/import:ro
      - ./docker/mongo-import.sh:/mongo-import.sh:ro
    entrypoint: ["/bin/bash", "/mongo-import.sh"]
    restart: "no"

  kafka:
    # Bitnami eliminó el tag corto `3.9`; imagen oficial Apache (KRaft), compatible con Kafka 3.9.x del curso.
    image: apache/kafka:3.9.1
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:19092"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 45s

  kafka-init:
    image: apache/kafka:3.9.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        /opt/kafka/bin/kafka-topics.sh \
          --create --if-not-exists \
          --bootstrap-server kafka:19092 \
          --topic flight-delay-ml-request \
          --partitions 1 \
          --replication-factor 1
        echo "Topic list:"
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --list
    restart: "no"

  spark-streaming:
    build:
      context: .
      dockerfile: docker/spark-streaming/Dockerfile
    hostname: spark-streaming
    depends_on:
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      mongo-import:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      KAFKA_PREDICTION_TOPIC: flight-delay-ml-request
      MONGO_SPARK_URI: mongodb://mongo:27017
      FLIGHT_PREDICTOR_BASE_PATH: /opt/practica
      SPARK_CHECKPOINT_DIR: /tmp/flight-predictor-checkpoint
    volumes:
      - ./models:/opt/practica/models:ro
    restart: on-failure:3

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    hostname: web
    ports:
      - "5001:5001"
    environment:
      PORT: "5001"
      FLASK_DEBUG: "0"
      MONGO_URI: mongodb://mongo:27017/
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      KAFKA_PREDICTION_TOPIC: flight-delay-ml-request
      ELASTIC_URL: http://elasticsearch:9200/agile_data_science
      PROJECT_HOME: /opt/practica
    depends_on:
      elasticsearch:
        condition: service_healthy
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      mongo-import:
        condition: service_completed_successfully
      spark-streaming:
        condition: service_started
    restart: on-failure:3

volumes:
  mongo_data:
  kafka_data:
  es_data:
  minio_data:
